<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Supabase Cost Simulator</title>
  <style>
    :root{--bg:#0b1220;--card:#111a2b;--card2:#0e1727;--text:#e5e7eb;--muted:#94a3b8;--border:rgba(255,255,255,.10);--a:#22c55e;--b:#f59e0b;--c:#ef4444;--d:#60a5fa;--p:#a78bfa}
    html,body{height:100%}
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:radial-gradient(1200px 700px at 30% 10%,rgba(96,165,250,.18),transparent 55%),radial-gradient(900px 600px at 70% 20%,rgba(167,139,250,.14),transparent 60%),var(--bg);color:var(--text)}
    .wrap{max-width:1160px;margin:0 auto;padding:18px 14px 26px}
    .title{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:14px}
    h1{margin:0;font-size:20px;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:12px;margin-top:3px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{appearance:none;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);padding:8px 10px;border-radius:10px;cursor:pointer;font-weight:600;font-size:12px}
    .btn:hover{background:rgba(255,255,255,.09)}
    .btn.primary{border-color:rgba(96,165,250,.35);background:linear-gradient(180deg,rgba(96,165,250,.22),rgba(96,165,250,.10))}
    .btn.good{border-color:rgba(34,197,94,.35);background:linear-gradient(180deg,rgba(34,197,94,.20),rgba(34,197,94,.08))}
    .btn.warn{border-color:rgba(245,158,11,.35);background:linear-gradient(180deg,rgba(245,158,11,.18),rgba(245,158,11,.08))}
    .btn.bad{border-color:rgba(239,68,68,.35);background:linear-gradient(180deg,rgba(239,68,68,.16),rgba(239,68,68,.06))}
    input[type=file]{font-size:12px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.22));border:1px solid var(--border);border-radius:14px;padding:12px}
    .kpi{display:flex;flex-direction:column;gap:6px}
    .kpi .n{font-size:18px;font-weight:800}
    .kpi .l{font-size:12px;color:var(--muted)}
    .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
    .span3{grid-column:span 3}
    .span4{grid-column:span 4}
    .span6{grid-column:span 6}
    .span12{grid-column:span 12}
    .hr{height:1px;background:var(--border);margin:10px 0}
    canvas{width:100%;height:220px;border-radius:12px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.07)}
    .table{width:100%;border-collapse:collapse;font-size:12px}
    .table th,.table td{border-bottom:1px solid rgba(255,255,255,.07);padding:8px 6px;text-align:left;color:var(--text)}
    .table th{color:var(--muted);font-weight:700}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.10);border-radius:999px;padding:4px 8px;font-size:11px;color:var(--muted)}
    .dot{width:8px;height:8px;border-radius:2px;display:inline-block}
    .muted{color:var(--muted)}
    @media (max-width: 980px){
      .span3,.span4,.span6{grid-column:span 12}
      canvas{height:200px}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <div>
        <h1>Simulación y análisis de costos (Supabase)</h1>
        <div class="sub">Carga un JSON generado por cost_sim/simulate_week.js y revisa proyección mensual y tendencias.</div>
      </div>
      <div class="row">
        <button class="btn primary" id="btn-load-latest">Cargar último</button>
        <label class="btn"><input id="file" type="file" accept="application/json"></label>
      </div>
    </div>

    <div class="grid">
      <div class="card span3 kpi">
        <div class="l">Plan</div>
        <div class="n mono" id="k-plan">—</div>
        <div class="l">Semana</div>
        <div class="mono muted" id="k-range">—</div>
      </div>
      <div class="card span3 kpi">
        <div class="l">Egress (semana)</div>
        <div class="n" id="k-egress">—</div>
        <div class="mono muted" id="k-egressp">—</div>
      </div>
      <div class="card span3 kpi">
        <div class="l">API requests (semana)</div>
        <div class="n" id="k-api">—</div>
        <div class="mono muted" id="k-auth">—</div>
      </div>
      <div class="card span3 kpi">
        <div class="l">Costo mensual estimado</div>
        <div class="n" id="k-cost">—</div>
        <div class="mono muted" id="k-cost2">—</div>
      </div>

      <div class="card span6">
        <div class="row" style="justify-content:space-between;margin-bottom:8px;">
          <div class="pill"><span class="dot" style="background:var(--d)"></span>Egress GB/día</div>
          <div class="row">
            <button class="btn" id="btn-export-json">Exportar JSON</button>
            <button class="btn" id="btn-export-csv">Exportar CSV</button>
            <button class="btn" id="btn-export-pdf">Exportar PDF</button>
          </div>
        </div>
        <canvas id="c-egress" width="960" height="260"></canvas>
      </div>

      <div class="card span6">
        <div class="row" style="justify-content:space-between;margin-bottom:8px;">
          <div class="pill"><span class="dot" style="background:var(--p)"></span>Requests/día</div>
          <div class="row">
            <span class="pill"><span class="dot" style="background:var(--d)"></span>API</span>
            <span class="pill"><span class="dot" style="background:var(--b)"></span>Auth</span>
            <span class="pill"><span class="dot" style="background:var(--a)"></span>DB</span>
          </div>
        </div>
        <canvas id="c-req" width="960" height="260"></canvas>
      </div>

      <div class="card span12">
        <div class="row" style="justify-content:space-between;">
          <div class="pill"><span class="dot" style="background:var(--a)"></span>Resumen diario</div>
          <div class="muted" id="k-status">—</div>
        </div>
        <div class="hr"></div>
        <div style="overflow:auto;">
          <table class="table" id="t-daily"></table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let state = { file: null, data: null };

    function fmtInt(n){return (n==null)?'—':String(Math.round(n)).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
    function fmtGBFromBytes(b){return (b/(1024*1024*1024)).toFixed(3)+' GB'}
    function fmtUSD(n){return '$ '+Number(n||0).toFixed(2)}

    function download(name, text, type){
      const blob = new Blob([text], {type: type||'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();}, 0);
    }

    function toCSV(rows){
      if(!rows.length) return '';
      const cols = Object.keys(rows[0]);
      const esc = (v)=>('"'+String(v??'').replace(/"/g,'""')+'"');
      return [cols.join(','), ...rows.map(r=>cols.map(c=>esc(r[c])).join(','))].join('\n');
    }

    function drawLine(ctx, series, color){
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.clearRect(0,0,w,h);
      const padL=46,padR=10,padT=14,padB=28;
      const innerW=w-padL-padR, innerH=h-padT-padB;
      const max = Math.max(...series.map(s=>s.v), 1);
      ctx.strokeStyle='rgba(255,255,255,.10)';
      ctx.lineWidth=1;
      for(let i=0;i<=4;i++){
        const y=padT+innerH*(i/4);
        ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();
      }
      ctx.fillStyle='rgba(148,163,184,.9)';
      ctx.font='12px system-ui';
      for(let i=0;i<=4;i++){
        const v=max*(1-i/4);
        const y=padT+innerH*(i/4);
        ctx.fillText(v.toFixed(2), 6, y+4);
      }
      const step = innerW / Math.max(1,(series.length-1));
      ctx.strokeStyle=color;
      ctx.lineWidth=2;
      ctx.beginPath();
      series.forEach((s,idx)=>{
        const x=padL+step*idx;
        const y=padT+innerH*(1-(s.v/max));
        if(idx===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      });
      ctx.stroke();
      ctx.fillStyle=color;
      series.forEach((s,idx)=>{
        const x=padL+step*idx;
        const y=padT+innerH*(1-(s.v/max));
        ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
      });
      ctx.fillStyle='rgba(148,163,184,.9)';
      ctx.font='11px system-ui';
      series.forEach((s,idx)=>{
        if(series.length>10 && idx%2===1) return;
        const x=padL+step*idx;
        ctx.fillText(s.k.slice(8,10), x-6, h-10);
      });
    }

    function drawBars(ctx, seriesA, seriesB, seriesC){
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.clearRect(0,0,w,h);
      const padL=46,padR=10,padT=14,padB=28;
      const innerW=w-padL-padR, innerH=h-padT-padB;
      const max = Math.max(
        ...seriesA.map(s=>s.v),
        ...seriesB.map(s=>s.v),
        ...seriesC.map(s=>s.v),
        1
      );
      ctx.strokeStyle='rgba(255,255,255,.10)';
      ctx.lineWidth=1;
      for(let i=0;i<=4;i++){
        const y=padT+innerH*(i/4);
        ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();
      }
      ctx.fillStyle='rgba(148,163,184,.9)';
      ctx.font='12px system-ui';
      for(let i=0;i<=4;i++){
        const v=max*(1-i/4);
        const y=padT+innerH*(i/4);
        ctx.fillText(fmtInt(v), 6, y+4);
      }
      const n = seriesA.length;
      const groupW = innerW / Math.max(1,n);
      const barW = Math.max(2, Math.floor(groupW*0.22));
      const colors = ['#60a5fa','#f59e0b','#22c55e'];
      for(let i=0;i<n;i++){
        const x0 = padL + groupW*i + Math.floor(groupW*0.18);
        const vs = [seriesA[i].v, seriesB[i].v, seriesC[i].v];
        vs.forEach((v,bi)=>{
          const hh = Math.round(innerH*(v/max));
          const x = x0 + bi*(barW+4);
          const y = padT + innerH - hh;
          const g = ctx.createLinearGradient(0,y,0,y+hh);
          g.addColorStop(0,'rgba(255,255,255,.25)');
          g.addColorStop(.35,colors[bi]);
          g.addColorStop(1,'rgba(0,0,0,.18)');
          ctx.fillStyle=g;
          ctx.fillRect(x,y,barW,hh);
        });
        if(n<=14 || i%2===0){
          ctx.fillStyle='rgba(148,163,184,.9)';
          ctx.font='11px system-ui';
          ctx.fillText(seriesA[i].k.slice(8,10), x0, h-10);
        }
      }
    }

    function predictLinear(series){
      const n = series.length;
      if(n<2) return { slope: 0, intercept: series[0]?.v||0 };
      let sx=0,sy=0,sxy=0,sxx=0;
      for(let i=0;i<n;i++){
        const x=i, y=series[i].v;
        sx+=x; sy+=y; sxy+=x*y; sxx+=x*x;
      }
      const den = n*sxx - sx*sx;
      const slope = den===0 ? 0 : (n*sxy - sx*sy)/den;
      const intercept = (sy - slope*sx)/n;
      return { slope, intercept };
    }

    function render(data){
      state.data = data;
      const meta = data.meta || {};
      const totals = data.totals_week || {};
      const est = data.pricing_estimate || {};
      document.getElementById('k-plan').textContent = (meta.plan||'—').toUpperCase();
      document.getElementById('k-range').textContent = (meta.start_day||'—') + ' + ' + (meta.days||0) + ' días';
      document.getElementById('k-egress').textContent = (totals.egress_gb??0).toFixed(3) + ' GB';
      document.getElementById('k-egressp').textContent = fmtInt(totals.api_requests||0) + ' requests';
      document.getElementById('k-api').textContent = fmtInt(totals.api_requests||0);
      document.getElementById('k-auth').textContent = 'Auth req: ' + fmtInt(totals.auth_requests||0);
      document.getElementById('k-cost').textContent = fmtUSD(est.total_usd||0);
      const comps = est.components_usd || {};
      document.getElementById('k-cost2').textContent =
        'Egress ' + fmtUSD(comps.egress||0) + ' · MAU ' + fmtUSD(comps.mau||0) + ' · Storage ' + fmtUSD(comps.storage||0);

      const daily = data.daily || [];
      const egressSeries = daily.map(d=>({k:d.day, v:(d.bytes.egress_bytes/(1024*1024*1024))}));
      const lr = predictLinear(egressSeries);
      const pred = [];
      for(let i=0;i<7;i++){
        const v = Math.max(0, lr.intercept + lr.slope*(egressSeries.length+i));
        pred.push({k:'P'+(i+1), v});
      }
      document.getElementById('k-status').textContent =
        'Tendencia egress: ' + (lr.slope>=0?'+':'') + lr.slope.toFixed(3) + ' GB/día (pred. 7 días)';

      const ctxE = document.getElementById('c-egress').getContext('2d');
      drawLine(ctxE, egressSeries, '#60a5fa');
      ctxE.fillStyle='rgba(167,139,250,.9)';
      ctxE.font='12px system-ui';
      ctxE.fillText('Predicción lineal 7 días (referencia): '+pred.map(p=>p.v.toFixed(2)).join(', '), 56, 18);

      const apiSeries = daily.map(d=>({k:d.day, v:d.operations.api_requests||0}));
      const authSeries = daily.map(d=>({k:d.day, v:d.operations.auth_requests||0}));
      const dbSeries = daily.map(d=>({k:d.day, v:(d.operations.db_reads_requests||0)+(d.operations.db_writes_requests||0)}));
      const ctxR = document.getElementById('c-req').getContext('2d');
      drawBars(ctxR, apiSeries, authSeries, dbSeries);

      const table = document.getElementById('t-daily');
      const rows = daily.map(d=>({
        dia: d.day,
        egress_gb: (d.bytes.egress_bytes/(1024*1024*1024)).toFixed(3),
        api_requests: d.operations.api_requests,
        auth_requests: d.operations.auth_requests,
        db_req: (d.operations.db_reads_requests||0)+(d.operations.db_writes_requests||0),
        edge: d.operations.edge_invocations,
        scans: d.attendance.scans,
        puntuales: d.attendance.puntuales,
        tardanzas: d.attendance.tardanzas
      }));
      table.innerHTML =
        '<thead><tr>' +
        '<th>Día</th><th>Egress</th><th>API</th><th>Auth</th><th>DB</th><th>Edge</th><th>Scans</th><th>P</th><th>T</th>' +
        '</tr></thead>' +
        '<tbody>' +
        rows.map(r=>'<tr>' +
          '<td class="mono">'+r.dia+'</td>' +
          '<td>'+r.egress_gb+' GB</td>' +
          '<td>'+fmtInt(r.api_requests)+'</td>' +
          '<td>'+fmtInt(r.auth_requests)+'</td>' +
          '<td>'+fmtInt(r.db_req)+'</td>' +
          '<td>'+fmtInt(r.edge)+'</td>' +
          '<td>'+fmtInt(r.scans)+'</td>' +
          '<td>'+fmtInt(r.puntuales)+'</td>' +
          '<td>'+fmtInt(r.tardanzas)+'</td>' +
        '</tr>').join('') +
        '</tbody>';

      document.getElementById('btn-export-json').onclick = () => {
        download('usage_week.json', JSON.stringify(data, null, 2), 'application/json');
      };
      document.getElementById('btn-export-csv').onclick = () => {
        download('usage_week_daily.csv', toCSV(rows), 'text/csv');
      };
      document.getElementById('btn-export-pdf').onclick = () => {
        const { jsPDF } = window.jspdf || {};
        if(!jsPDF) return alert('jsPDF no disponible');
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(14);
        doc.text('Informe ejecutivo semanal (Supabase)', 14, 18);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.text('Plan: ' + (meta.plan||'—') + ' · Escenario: ' + (meta.scenario||'—') + ' · Inicio: ' + (meta.start_day||'—'), 14, 25);
        doc.text('Egress semana: ' + (totals.egress_gb??0).toFixed(3) + ' GB · API req: ' + fmtInt(totals.api_requests||0), 14, 31);
        doc.text('Costo mensual estimado: ' + fmtUSD(est.total_usd||0), 14, 37);
        doc.text('Drivers: egress=' + fmtUSD((est.components_usd||{}).egress||0) + ', storage=' + fmtUSD((est.components_usd||{}).storage||0) + ', MAU=' + fmtUSD((est.components_usd||{}).mau||0), 14, 43);
        doc.text('Recomendaciones:', 14, 52);
        const recs = [
          '1) Evitar select * en reportes masivos: usar agregados (resumen_mensual) y paginar solo cuando se requiera detalle.',
          '2) Cachear usuario actual para no llamar auth.getUser por cada registro de asistencia.',
          '3) Para rangos largos, generar reportes server-side (RPC/Edge) para reducir egress al cliente.'
        ];
        let y = 58;
        recs.forEach(t=>{ doc.text(t, 14, y); y += 6; });
        doc.save('informe_semanal_supabase.pdf');
      };
    }

    async function loadLatest(){
      try{
        const r = await fetch('/api/latest', { cache: 'no-store' });
        const j = await r.json();
        if(!j || !j.data) return alert('No hay archivos en cost_sim/out');
        state.file = j.file;
        render(j.data);
      }catch(e){
        alert('No se pudo cargar el último. Usa el selector de archivo.');
      }
    }

    document.getElementById('btn-load-latest').onclick = loadLatest;
    document.getElementById('file').addEventListener('change', async (ev)=>{
      const f = ev.target.files && ev.target.files[0];
      if(!f) return;
      const txt = await f.text();
      const j = JSON.parse(txt);
      state.file = f.name;
      render(j);
    });

    setInterval(async ()=>{
      if(!state.data) return;
      try{
        const r = await fetch('/api/latest', { cache: 'no-store' });
        const j = await r.json();
        if(!j || !j.data) return;
        if(state.file && j.file && j.file !== state.file){
          state.file = j.file;
          render(j.data);
        }
      }catch(e){}
    }, 3000);
  </script>
</body>
</html>
